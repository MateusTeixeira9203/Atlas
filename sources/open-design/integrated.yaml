notes: |
  open-design e o repositorio mais rico em design mas tambem mais acoplado
  ao ecossistema proprietario nexu-io/open-design. A curacao precisa remover
  referencias ao od CLI e UI propria antes de integrar ao cpe-design.
  Apache 2.0 exige atribuicao em toda distribuicao — incluir no cabecalho de cada arquivo.
  Commit mais recente: 2026-06-22 (repo ativamente mantido).
