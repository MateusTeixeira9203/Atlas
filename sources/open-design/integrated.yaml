# ESTRATEGIA: open-design e massivo (200+ skills, 250+ design systems).
# NAO integrar tudo — curacao seletiva das categorias de maior valor para o CPE.
# Criterio de selecao: recursos que elevam a qualidade visual e evitam o "generico".

