source_id: open-design
schema_version: 1
license: Apache-2.0
integrated_at: 2026-06-22

# ESTRATÉGIA: open-design é massivo (200+ skills, 250+ design systems).
# Curação seletiva das categorias de maior valor. Muitos skills são catálogos
# que apontam para upstream repos — extraído apenas conteúdo substancial.
# Atlas-authored items sintetizados das fontes marcados como source: cpe.

resources:
