    original_url: https://github.com/nexu-io/open-design/tree/main/skills/gsap-core
    source_commit: 1cb7eae4
    license: MIT
    integrated_at: 2026-06-22
    adaptation: >
      Conteúdo expandido com exemplos de stagger avançado, timelines e hover
      patterns. MIT license permite preservação direta.

