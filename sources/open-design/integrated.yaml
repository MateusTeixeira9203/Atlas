  - id: open-design-skill-design-brief
    type: skill
    status: integrated
    target_plugin: atlas-design
    cpe_path: plugins/atlas-design/skills/design-brief/SKILL.md
    original_path: skills/design-brief/SKILL.md
    original_url: https://github.com/nexu-io/open-design/tree/main/skills/design-brief
    source_commit: 1cb7eae4
    integrated_at: 2026-06-22
    adaptation: >
      Conteúdo preservado. Adicionado vocabulário fechado com valores explícitos
      e regras de resolução de defaults. Removida referência a od CLI.
    notes: "8 dimensões de design: palette, accent, body, display, layout, mood, density, constraints"

  - id: open-design-skill-impeccable-design-polish
    type: skill
    status: integrated
    target_plugin: atlas-design
    cpe_path: plugins/atlas-design/skills/impeccable-design-polish/SKILL.md
