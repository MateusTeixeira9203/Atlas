notes: |
  open-design é o repositório mais rico em design mas acoplado ao ecossistema nexu-io.
  Muitas skills são catálogos (não autocontidos) — estratégia: extrair conteúdo de skills
  com conteúdo substancial, ignorar ponteiros vazios.
  Fase 6 integrou: 4 skills (3 open-design + 1 Atlas-synthesis), 3 agents (Atlas-synthesis),
  4 commands (Atlas-synthesis). Total Phase 6: 11 recursos.
