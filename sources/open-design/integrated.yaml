    source_commit: 1cb7eae4
    original_author: pbakaus
    integrated_at: 2026-06-22
    adaptation: >
      Normalizado para Atlas. Anti-AI-tells preservados integralmente. Adicionado
      padrão before/after em CSS para clareza.

  - id: open-design-skill-gsap-core
    type: skill
    status: integrated
    target_plugin: atlas-design
    cpe_path: plugins/atlas-design/skills/gsap-core/SKILL.md
