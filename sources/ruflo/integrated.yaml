# =============================================================================
# CPE — Recursos integrados de: ruflo
# =============================================================================

source_id: ruflo
schema_version: 1
status_note: "Planejado na Fase 2. Extracao real na Fase 4 (Agentes) e Fase 5 (Commands)."
license: MIT

# ESTRATEGIA: ruflo e massivo (531 MB, 40+ plugins TypeScript).
# NAO integrar o framework inteiro — extrair padroes, guias e configuracoes
# que enriquecem o cpe-workflows. O codigo TypeScript do ruflo e muito
# especializado (swarm, RAG, federation) e nao se encaixa diretamente.
# O valor real esta em: padroes de orquestracao, config de agentes (TOML/YAML),
# documentacao de workflow e CLAUDE.md de integracao.

resources:
  # --- Agentes extraídos na Fase 4 ---
  - id: ruflo-agent-swarm-coordinator
    type: agent
    status: integrated
    target_plugin: cpe-workflows
    original_path: .agents/ (swarm orchestration patterns)
    original_url: https://github.com/ruvnet/ruflo
    source_commit: 9c28fe038cf49ac6db0bb4e04b6158076f03894d
    normalized: true
    adaptation_note: "Padrão de orquestração swarm extraído e implementado como AGENT.md CPE. Não é cópia direta — é o padrão materializado em formato portátil."
    integrated_at: 2026-06-22

  - id: ruflo-agent-goal-planner
    type: agent
    status: integrated
    target_plugin: cpe-workflows
    original_path: v3/goal_ui/ (goal planner patterns)
    original_url: https://github.com/ruvnet/ruflo
    source_commit: 9c28fe038cf49ac6db0bb4e04b6158076f03894d
    normalized: true
    adaptation_note: "Padrão A* de goal planning extraído do goal.ruv.io e implementado como AGENT.md CPE. Não é cópia do TypeScript — é o padrão de planejamento abstraído."
    integrated_at: 2026-06-22

  # --- Recursos integrados na Fase 7 ---
  - id: ruflo-agent-orchestration-guide
    type: skill
    status: integrated
    target_plugin: cpe-workflows
    cpe_path: plugins/cpe-workflows/skills/orchestration-guide/SKILL.md
    original_path: AGENTS.md + CLAUDE.md
    original_url: https://github.com/ruvnet/ruflo
    source_commit: 9c28fe038cf49ac6db0bb4e04b6158076f03894d
    integrated_at: 2026-06-22
    adaptation: >
      Padrões extraídos de AGENTS.md e CLAUDE.md, normalizados como SKILL.md CPE.
      Inclui: memory-first protocol, topologias (pipeline/fan-out/supervisor),
      three-tier model routing, anti-drift protocol, regras de comunicação.

  - id: ruflo-agent-config-profiles
    type: template
    status: integrated
    target_plugin: templates
    cpe_path: templates/workflows/agent-profiles/TEMPLATE.md
    original_path: .agents/config.toml
    original_url: https://github.com/ruvnet/ruflo/blob/main/.agents/config.toml
    source_commit: 9c28fe038cf49ac6db0bb4e04b6158076f03894d
    integrated_at: 2026-06-22
    adaptation: >
      TOML convertido para YAML CPE. Profiles dev/safe/ci preservados.
      Removida dependência de claude-flow CLI. Adicionada seção de security
      com blocked_file_patterns.

  - id: ruflo-integration-guide
    type: skill
    status: integrated
    target_plugin: cpe-workflows
    cpe_path: plugins/cpe-workflows/skills/orchestration-guide/SKILL.md
    original_path: CLAUDE.md
    original_url: https://github.com/ruvnet/ruflo/blob/main/CLAUDE.md
    source_commit: 9c28fe038cf49ac6db0bb4e04b6158076f03894d
    integrated_at: 2026-06-22
    adaptation: >
      Princípios genéricos de coordenação (three-tier routing, concurrency model,
      anti-drift) absorvidos no orchestration-guide skill. Referências ao
      ruflo CLI e ao sistema proprietário SONA foram omitidas.

notes: |
  ruflo e um framework de producao complexo. Integracao direta do codigo
  TypeScript nao faz sentido para o CPE. O valor esta em padroes e documentacao.
  531 MB -> repo pesado; nao clonar no state_dir. Acessar recursos via GitHub API
  ou sparse-checkout durante integracao.
  MIT license — atribuicao simples.
